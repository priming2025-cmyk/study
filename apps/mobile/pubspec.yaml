name: study_up
description: Study-up MVP (on-device attention + minimal server)
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # state / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # supabase
  supabase_flutter: ^2.6.0
  url_launcher: ^6.3.2

  # local cache
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # env
  flutter_dotenv: ^5.1.0

  # attention signals (on-device)
  # face_detection_tflite: iOS·Android·macOS·Win·Linux 지원, ML Kit 대비 ~5.5배 빠름
  # 웹: face_attention_sensor_web.dart 가 takePicture JPEG + detectFaces 로 집중 신호 생성
  face_detection_tflite: ^6.2.5
  flutter_litert: ^2.5.2
  camera: ^0.11.0+2

  # 로컬 알림(계획 시작 시각)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  shared_preferences: ^2.3.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/audio/

