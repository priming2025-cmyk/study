name: study_up
description: Study-up MVP (on-device attention + minimal server)
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # state / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # supabase
  supabase_flutter: ^2.6.0

  # local cache
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # env
  flutter_dotenv: ^5.1.0

  # attention signals (on-device)
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.11.0+2

  # webrtc (study room)
  flutter_webrtc: ^0.11.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env

