<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="study_up">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>study_up</title>
  <link rel="manifest" href="manifest.json">

  <!-- LiteRT.js: 얼굴 분석 WASM. 페이지 로드 시 미리 받아 Safari에서 준비 중이 길어지는 문제 완화 -->
  <script type="module">
    (async () => {
      const moduleUrl = 'https://cdn.jsdelivr.net/npm/@litertjs/core@2.4.0/+esm';
      const wasmUrl = 'https://cdn.jsdelivr.net/npm/@litertjs/core@2.4.0/wasm/litert_wasm_internal.js';
      try {
        const mod = await import(moduleUrl);
        await mod.loadLiteRt(wasmUrl);
        window.LiteRt = mod;
        window.LiteRtReady = true;
      } catch (e) {
        console.error('study_up: LiteRT.js preload failed', e);
        window.LiteRtReady = false;
        window.LiteRtLoadError = e && e.message ? e.message : String(e);
      } finally {
        window.dispatchEvent(new Event('litert-ready'));
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
